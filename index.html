<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Morpheme Trainer</title>
<style>
:root {
  --bg:       #f1f5f9;
  --card:     #ffffff;
  --ink:      #1e293b;
  --muted:    #64748b;
  --line:     #e2e8f0;
  --accent:   #0021A5;
  --accent-d: #001a82;
  --teal:     #FA4616;
  --teal-d:   #d63c10;
  --green-t:  #166534;
  --green-bg: #dcfce7;
  --red-t:    #991b1b;
  --red-bg:   #fee2e2;
  --tile-bg:  #f8fafc;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
.hidden { display: none !important; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  font-size: 16px;
  line-height: 1.5;
}

.wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 18px 16px 40px;
}

/* ── Header ── */
.header { margin-bottom: 16px; }
.header h1 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.4px;
}
.header .sub {
  color: var(--muted);
  font-size: 15px;
  margin-top: 3px;
}

/* ── Tabs ── */
.tabs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 16px;
}
.tab-btn {
  padding: 13px 8px;
  border-radius: 13px;
  border: 1.5px solid var(--line);
  background: var(--card);
  cursor: pointer;
  font: inherit;
  font-weight: 600;
  font-size: 13px;
  color: var(--muted);
  transition: border-color 0.1s, color 0.1s, background 0.1s;
  text-align: center;
  line-height: 1.3;
}
.tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
.tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── Tier selector ── */
.tier-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 10px;
}
.tier-row-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
  margin-right: 2px;
}
.tier-btn {
  padding: 7px 18px;
  border-radius: 999px;
  border: 1.5px solid var(--line);
  background: var(--card);
  cursor: pointer;
  font: inherit;
  font-weight: 600;
  font-size: 13px;
  color: var(--muted);
  transition: border-color 0.1s, color 0.1s, background 0.1s;
}
.tier-btn:hover:not(.active) { border-color: var(--teal); color: var(--teal); }
.tier-btn.active { background: var(--teal); border-color: var(--teal); color: #fff; }

/* ── Stats row ── */
.stats-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: stretch;
}
.stat-box {
  flex: 1;
  min-width: 0;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 10px 10px;
  text-align: left;
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  font-weight: 600;
}
.stat-main {
  font-size: 22px;
  font-weight: 800;
  margin-top: 3px;
  color: var(--ink);
  line-height: 1.05;
}
.stat-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.2;
}
.stat-split {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-top: 5px;
}
.stat-key {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
}
.stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.1;
}
.timer-box {
  display: none;
  flex-shrink: 0;
  width: 76px;
  background: var(--accent);
  color: #fff;
  border-radius: 13px;
  padding: 11px 6px;
  text-align: center;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.timer-box.visible { display: flex; }
.timer-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-weight: 600;
  opacity: 0.85;
}
.timer-value { font-size: 22px; font-weight: 800; margin-top: 2px; }

/* ── Card ── */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.04);
}

.word-display {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -0.3px;
  line-height: 1.1;
  margin-bottom: 4px;
  word-break: normal;
  overflow-wrap: break-word;
}
.instruction {
  font-size: 15px;
  color: var(--muted);
  margin-bottom: 14px;
  min-height: 22px;
}
.word-hint {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 10px;
  font-style: italic;
}
.word-hint:empty { display: none; }

/* ── Part cards (Build the Word) ── */
.part-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}
.part-card {
  background: var(--tile-bg);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 14px 16px;
}
.part-card .pc-part { font-size: 20px; font-weight: 800; }
.part-card .pc-meaning { font-size: 14px; color: var(--muted); margin-top: 4px; }

/* ── Choice buttons ── */
.choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.choice-btn {
  padding: 14px 12px;
  border-radius: 13px;
  border: 1.5px solid var(--line);
  background: #fff;
  cursor: pointer;
  font: inherit;
  font-size: 15px;
  text-align: left;
  color: var(--ink);
  line-height: 1.4;
  transition: border-color 0.1s, transform 0.08s;
}
.choice-btn:active:not(:disabled) { transform: scale(0.97); }
.choice-btn:hover:not(:disabled)  { border-color: var(--accent); }
.choice-btn:disabled { cursor: default; }
.choice-btn.correct { background: var(--green-bg); border-color: #86efac; color: var(--green-t); }
.choice-btn.wrong   { background: var(--red-bg);   border-color: #fca5a5; color: var(--red-t);   }

/* ── Tile grid (Slow It Down — part selection) ── */
.tile-section { margin-bottom: 0; }
.section-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 10px;
}
.tile-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.tile-btn {
  background: var(--tile-bg);
  border: 1.5px solid var(--line);
  border-radius: 13px;
  padding: 16px 12px;
  cursor: pointer;
  font: inherit;
  font-size: 17px;
  font-weight: 700;
  text-align: center;
  color: var(--ink);
  transition: border-color 0.1s, background 0.1s, transform 0.08s;
}
.tile-btn:active:not(:disabled) { transform: scale(0.97); }
.tile-btn:hover:not(:disabled)  { border-color: var(--accent); }
.tile-btn:disabled { cursor: default; }
.tile-btn.selected { background: var(--green-bg); border-color: #86efac; color: var(--green-t); }
.tile-btn.nudge    { border-color: #fca5a5 !important; }

/* ── Part breakdown (Slow It Down — after parts selected) ── */
.part-breakdown {
  margin-top: 14px;
  padding: 10px 14px;
  background: var(--tile-bg);
  border: 1px solid var(--line);
  border-radius: 10px;
  font-size: 13px;
  color: var(--muted);
  line-height: 1.9;
}

/* Meaning reveal section (Slow It Down step 2) */
.meaning-reveal {
  border-top: 1px solid var(--line);
  margin-top: 20px;
  padding-top: 18px;
}

/* ── Feedback ── */
.feedback {
  display: block;
  margin-top: 10px;
  min-height: 54px;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.4;
  visibility: hidden;
  background: transparent;
  border: 1px solid transparent;
}
.feedback.good { visibility: visible; background: var(--green-bg); color: var(--green-t); }
.feedback.bad  { visibility: visible; background: var(--red-bg);   color: var(--red-t);   }
.feedback strong { font-weight: 700; }
.feedback .detail { font-size: 13px; margin-top: 3px; opacity: 0.85; }

/* ── Controls ── */
.controls {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
  align-items: center;
}
.ctrl-btn {
  padding: 11px 16px;
  border-radius: 10px;
  border: 1.5px solid var(--line);
  background: #fff;
  cursor: pointer;
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  transition: border-color 0.1s, background 0.1s;
}
.ctrl-btn:hover { border-color: var(--muted); }
.ctrl-btn.primary {
  background: var(--teal); border-color: var(--teal); color: #fff;
}
.ctrl-btn.primary:hover { background: var(--teal-d); border-color: var(--teal-d); }
.ctrl-btn.challenge-start {
  background: var(--accent); border-color: var(--accent); color: #fff;
}
.ctrl-btn.challenge-start:hover { background: var(--accent-d); border-color: var(--accent-d); }
.ctrl-btn.challenge-end {
  background: #dc2626; border-color: #dc2626; color: #fff;
}
.ctrl-btn.challenge-end:hover { background: #b91c1c; border-color: #b91c1c; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .wrap {
    padding: 16px 12px 32px;
  }

  .header {
    margin-bottom: 12px;
  }

  .header h1 {
    font-size: 24px;
    letter-spacing: -0.3px;
  }

  .header .sub {
    font-size: 14px;
    margin-top: 2px;
  }

  .tier-row {
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .tier-row-label {
    font-size: 10px;
    margin-right: 0;
  }

  .tier-btn {
    padding: 7px 14px;
    font-size: 12px;
  }

  .tabs {
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin-bottom: 12px;
  }

  .tab-btn {
    padding: 10px 6px;
    font-size: 12px;
    border-radius: 11px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }

  .stat-box,
  .timer-box {
    width: auto;
    min-width: 0;
    padding: 9px 8px;
    border-radius: 11px;
  }

  .stat-label,
  .timer-label {
    font-size: 9px;
  }

  .stat-main,
  .timer-value {
    font-size: 18px;
  }

  .stat-value {
    font-size: 16px;
  }

  .stat-sub,
  .stat-key {
    font-size: 11px;
  }

  .card {
    padding: 16px 14px;
    border-radius: 18px;
  }

  .word-display {
    font-size: 30px;
    margin-bottom: 4px;
  }

  .word-hint {
    font-size: 13px;
    margin-bottom: 10px;
  }

  .instruction {
    font-size: 14px;
    margin-bottom: 12px;
    min-height: 0;
  }

  .part-cards {
    gap: 8px;
    margin-bottom: 14px;
  }

  .part-card {
    padding: 12px 14px;
  }

  .part-card .pc-part {
    font-size: 18px;
  }

  .part-card .pc-meaning {
    font-size: 13px;
  }

  .choice-grid,
  .tile-grid {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .choice-btn,
  .tile-btn {
    padding: 12px;
    font-size: 15px;
    border-radius: 12px;
  }

  .controls {
    gap: 8px;
    margin-top: 10px;
    padding-top: 12px;
  }

  .ctrl-btn {
    padding: 10px 14px;
    font-size: 14px;
  }

  .ctrl-btn.challenge-start {
    flex: 1 1 100%;
    order: 1;
  }

  .ctrl-btn.primary {
    flex: 1 1 auto;
    order: 2;
  }

  .controls .ctrl-btn:not(.challenge-start):not(.primary) {
    order: 3;
  }

  .meaning-reveal {
    margin-top: 16px;
    padding-top: 14px;
  }

  .part-breakdown {
    margin-top: 10px;
    padding: 8px 10px;
    font-size: 12px;
  }

  .feedback {
    margin-top: 12px;
    min-height: 60px;
    padding: 11px 12px;
    font-size: 14px;
  }
}

@media (max-width: 1024px) and (orientation: landscape) {
  .wrap {
    padding-top: 12px;
    padding-bottom: 24px;
  }

  .header {
    margin-bottom: 10px;
  }

  .header .sub {
    margin-top: 1px;
  }

  .tabs,
  .stats-row {
    margin-bottom: 10px;
  }

  .card {
    padding: 16px 18px;
  }

  .word-display {
    font-size: 32px;
  }

  .word-hint {
    margin-bottom: 8px;
  }

  .instruction {
    margin-bottom: 10px;
  }

  .part-cards {
    margin-bottom: 12px;
  }

  .meaning-reveal {
    margin-top: 14px;
    padding-top: 14px;
  }

  .feedback {
    min-height: 48px;
    padding: 9px 10px;
    font-size: 13px;
  }

  .controls {
    margin-top: 8px;
    padding-top: 10px;
  }
}

/* ── Morpheme Bank ── */
.bank-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.04);
  display: flex;
  flex-direction: column;
  gap: 22px;
}
.bank-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--muted);
  margin-bottom: 10px;
}
.bank-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.bank-entry {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background: var(--tile-bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 10px 13px;
}
.bk-morph {
  font-size: 16px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.2px;
}
.bk-meaning {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-top: 1px;
}
.bk-examples {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
  line-height: 1.5;
}
.stats-row.bank-active {
  opacity: 0.3;
  pointer-events: none;
}
@media (max-width: 600px) {
  .bank-card { padding: 16px 14px; border-radius: 18px; gap: 18px; }
  .bank-grid { grid-template-columns: 1fr; gap: 7px; }
}

</style>
</head>
<body>
<div class="wrap">

  <header class="header">
    <h1>Morpheme Trainer</h1>
    <p class="sub">Build word meaning one part at a time.</p>
  </header>

  <div class="tier-row">
    <span class="tier-row-label">Level</span>
    <button class="tier-btn active" id="tierBtn_tier_1" onclick="setTier('tier_1')">1</button>
    <button class="tier-btn"        id="tierBtn_tier_2" onclick="setTier('tier_2')">2</button>
    <button class="tier-btn"        id="tierBtn_tier_3" onclick="setTier('tier_3')">3</button>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" id="tab0" onclick="setMode(0)">Learn the Part</button>
    <button class="tab-btn"        id="tab1" onclick="setMode(1)">Build the Word</button>
    <button class="tab-btn"        id="tab2" onclick="setMode(2)">Slow It Down</button>
    <button class="tab-btn"        id="tab3" onclick="openBank()">Morpheme Bank</button>
  </nav>

  <div class="stats-row" id="statsRow">
    <div class="stat-box">
      <div class="stat-label">Accuracy</div>
      <div class="stat-main" id="sAccuracyFraction">0/0</div>
      <div class="stat-sub" id="sAccuracyPercent">0%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Streaks</div>
      <div class="stat-split"><span class="stat-key">Now</span><span class="stat-value" id="sStreakNow">0</span></div>
      <div class="stat-split"><span class="stat-key">Best</span><span class="stat-value" id="sStreakBest">0</span></div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Best 60s</div>
      <div class="stat-main" id="sBest60">0</div>
      <div class="stat-sub">Top challenge score</div>
    </div>
    <div class="timer-box" id="timerBox">
      <div class="timer-label">Time</div>
      <div class="timer-value" id="timerVal">1:00</div>
    </div>
  </div>

  <div class="card" id="gameCard">
    <div class="word-display" id="wordDisplay"></div>
    <div class="word-hint"    id="wordHint"></div>
    <div class="instruction"  id="instruction"></div>

    <!-- Learn the Part -->
    <div id="area0">
      <div class="choice-grid" id="choices0"></div>
    </div>

    <!-- Build the Word -->
    <div id="area1" class="hidden">
      <div class="part-cards" id="partCards1"></div>
      <div class="choice-grid" id="choices1"></div>
    </div>

    <!-- Slow It Down -->
    <div id="area2" class="hidden">
      <div class="tile-section">
        <div class="section-label">Select the parts</div>
        <div class="tile-grid" id="tileGrid2"></div>
      </div>
      <div id="partBreakdown2" class="part-breakdown hidden"></div>
      <div id="meaningReveal2" class="meaning-reveal hidden">
        <div class="section-label">Now choose the meaning</div>
        <div class="choice-grid" id="choices2"></div>
      </div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="controls">
      <button class="ctrl-btn challenge-start" id="challengeBtn" onclick="toggleChallenge()">60-Second Challenge</button>
      <button class="ctrl-btn primary" onclick="nextQuestion()">Next</button>
      <button class="ctrl-btn" onclick="resetMode()">Reset This Mode</button>
    </div>
  </div>

  <!-- Morpheme Bank -->
  <div id="area3" class="bank-card hidden">
    <div>
      <div class="bank-section-title">Prefixes</div>
      <div class="bank-grid" id="bankPrefixes"></div>
    </div>
    <div>
      <div class="bank-section-title">Suffixes</div>
      <div class="bank-grid" id="bankSuffixes"></div>
    </div>
    <div>
      <div class="bank-section-title">Roots</div>
      <div class="bank-grid" id="bankRoots"></div>
    </div>
  </div>

</div>

<script>
// ── Word bank ──────────────────────────────────────────────────────────────────
// Three tiers: easy → intermediate → harder/abstract.
// To load a full tier later, replace the array for that key.
// All modes read from wordBank[activeTier] via getBank().
const wordBank = {

  // ── Tier 1 — simple prefixes & suffixes, everyday words ──────────────────
  tier_1: [

{word:"preview",parts:["pre","view"],part_meanings:["before","see"],definition:"see before",quiz_part_indexes:[0]},
{word:"replay",parts:["re","play"],part_meanings:["again","play"],definition:"play again",quiz_part_indexes:[0]},
{word:"unhappy",parts:["un","happy"],part_meanings:["not","happy"],definition:"not happy",quiz_part_indexes:[0]},
{word:"dislike",parts:["dis","like"],part_meanings:["not","like"],definition:"not like",quiz_part_indexes:[0]},
{word:"misread",parts:["mis","read"],part_meanings:["wrong","read"],definition:"read wrong",quiz_part_indexes:[0]},

{word:"inside",parts:["in","side"],part_meanings:["in","side"],definition:"on the inside",quiz_part_indexes:[0]},
{word:"impossible",parts:["im","possible"],part_meanings:["not","possible"],definition:"not possible",quiz_part_indexes:[0]},
{word:"irregular",parts:["ir","regular"],part_meanings:["not","regular"],definition:"not regular",quiz_part_indexes:[0]},

{word:"subway",parts:["sub","way"],part_meanings:["under","way"],definition:"way under ground",quiz_part_indexes:[0]},
{word:"transport",parts:["trans","port"],part_meanings:["across","carry"],definition:"carry across",quiz_part_indexes:[0]},
{word:"autograph",parts:["auto","graph"],part_meanings:["self","write"],definition:"your own signature",quiz_part_indexes:[0]},
{word:"telephone",parts:["tele","phone"],part_meanings:["far","sound"],definition:"sound from far",quiz_part_indexes:[0]},
{word:"nonstop",parts:["non","stop"],part_meanings:["not","stop"],definition:"not stopping",quiz_part_indexes:[0]},

{word:"bicycle",parts:["bi","cycle"],part_meanings:["two","wheel"],definition:"two wheels",quiz_part_indexes:[0]},
{word:"triangle",parts:["tri","angle"],part_meanings:["three","angle"],definition:"shape with three angles",quiz_part_indexes:[0]},

{word:"teacher",parts:["teach","er"],part_meanings:["teach","person"],definition:"person who teaches",quiz_part_indexes:[1]},
{word:"actor",parts:["act","or"],part_meanings:["act","person"],definition:"person who acts",quiz_part_indexes:[1]},

// ── Utilities ──────────────────────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let recentQuizParts = [];

function getItemQuizKeys(item) {
  const indexes = getLearnPartIndexes(item);
  return indexes.map(i => normalizeMorphemeText(item.parts[i])).filter(Boolean);
}

function pickWeightedRandom(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function trackRecentQuizParts(item) {
  const keys = getItemQuizKeys(item);
  keys.forEach(key => {
    recentQuizParts.push(key);
    if (recentQuizParts.length > 8) recentQuizParts.shift();
  });
}

function randomItem() {
  const bank = getBank();
  const filtered = bank.filter(item => {
    const keys = getItemQuizKeys(item);
    return !keys.some(key => recentQuizParts.includes(key));
  });

  const pool = filtered.length >= 6 ? filtered : bank;
  const chosen = pickWeightedRandom(pool);
  trackRecentQuizParts(chosen);
  return chosen;
}

// ── Stats display ──────────────────────────────────────────────────────────────
function updateStats() {
  const s = modeStats[mode];
  const percent = s.tried ? Math.round((s.correct / s.tried) * 100) : 0;
  $('sAccuracyFraction').textContent = `${s.correct}/${s.tried}`;
  $('sAccuracyPercent').textContent  = `${percent}%`;
  $('sStreakNow').textContent        = s.streak;
  $('sStreakBest').textContent       = s.best;
  $('sBest60').textContent           = s.best60;
}

// ── Feedback ───────────────────────────────────────────────────────────────────
function clearFeedback() {
  const f = $('feedback');
  f.className = 'feedback';
  f.innerHTML = '';
}

function setFeedback(type, headline, detail) {
  const f = $('feedback');
  f.className = 'feedback ' + type;
  f.innerHTML = `<strong>${headline}</strong>${detail ? `<div class="detail">${detail}</div>` : ''}`;
}

// ── Record a graded answer ─────────────────────────────────────────────────────
function recordAnswer(isCorrect) {
  const s = modeStats[mode];
  s.tried++;
  if (isCorrect) {
    s.correct++;
    s.streak++;
    if (s.streak > s.best) s.best = s.streak;
  } else {
    s.streak = 0;
  }
  updateStats();
}

function renderBank() {

    { key: 'prefixes', id: 'bankPrefixes' },
    { key: 'suffixes', id: 'bankSuffixes' },
    { key: 'roots',    id: 'bankRoots'    },
  ].forEach(({ key, id }) => {
    const container = $(id);
    if (container.childElementCount) return; // already rendered
    morphemeBank[key].forEach(entry => {
      const div = document.createElement('div');
      div.className = 'bank-entry';
      div.innerHTML =
        `<span class="bk-morph">${entry.morpheme}</span>` +
        `<span class="bk-meaning">${entry.meaning}</span>` +
        `<span class="bk-examples">${entry.examples.join(' · ')}</span>`;
      container.appendChild(div);
    });
  });
}

// ── Word display ───────────────────────────────────────────────────────────────
function setWordDisplay(word) {
  $('wordDisplay').textContent = word;
}


// Normalize text so Learn the Part can avoid weak questions like care = care.
function normalizeMorphemeText(text) {
  return String(text).toLowerCase().replace(/[^a-z]/g, '');
}

function getLearnPartIndexes(item) {
  const base = Array.isArray(item.quiz_part_indexes) && item.quiz_part_indexes.length
    ? [...item.quiz_part_indexes]
    : item.parts.map((_, i) => i);

  const strong = base.filter(i => normalizeMorphemeText(item.parts[i]) !== normalizeMorphemeText(item.part_meanings[i]));
  return strong.length ? strong : base;
}

// ── Tier-based support helpers ────────────────────────────────────────────────
// Returns true only for Tier 1. Used to gate scaffolding across all three modes.
function isTier1() { return activeTier === 'tier_1'; }

// Learn the Part: show the full-word definition hint only on Tier 1.
function shouldShowHint()              { return isTier1(); }

// Build the Word: show part meanings in the part cards only on Tier 1.
function shouldShowBuildMeanings()     { return isTier1(); }

// Slow It Down: show the `part = meaning` breakdown after correct split only on Tier 1.
// Tier 2/3: the highlighted tile already confirms the split — no extra info needed.
function shouldShowSlowBreakdown()     { return isTier1(); }

// Feedback detail for Build the Word and Slow It Down answer panels.
// Tier 1: full part = meaning breakdown. Tier 2/3: definition only.
function buildFeedbackDetail(item) {
  if (isTier1()) {
    return `${item.word} = ${item.definition}<br>${item.parts.map((p, i) => `${p} = ${item.part_meanings[i]}`).join(', ')}`;
  }
  return `${item.word} = ${item.definition}`;
}

// ── Distractor pool — built from confusion groups first, then active tier ─────
const meaningConfusionGroups = [
  ["before", "again", "not", "wrong"],
  ["under", "across", "around", "far"],
  ["one", "two", "three"],
  ["self", "person who", "same", "together"],
  ["full of", "without", "state of", "in a way"],
  ["result of", "able to be", "able to", "study of"],
  ["life", "earth", "water", "heat", "time"],
  ["look", "see", "sound", "write", "measure", "carry"],
  ["wheel", "angle", "foot", "language"],
  ["history", "order", "related to", "control"],
  ["join", "cut", "lead", "travel"],
  ["sea", "soil", "zero", "Atlantic"],
  ["made-up story", "sense", "same shape", "language"]
];

function normalizeMeaningKey(text) {
  return String(text).trim().toLowerCase();
}

function getMeaningConfusions(correct) {
  const key = normalizeMeaningKey(correct);
  const matches = meaningConfusionGroups.find(group => group.map(normalizeMeaningKey).includes(key));
  if (!matches) return [];
  return matches.filter(value => normalizeMeaningKey(value) !== key);
}

function getDistractors(correct) {
  const fromGroups = getMeaningConfusions(correct);
  const all = new Set(fromGroups);
  getBank().forEach(item => item.part_meanings.forEach(m => {
    if (normalizeMeaningKey(m) !== normalizeMeaningKey(correct)) all.add(m);
  }));
  return shuffle([...all]).slice(0, 3);
}

// ── MODE 0 — Learn the Part ───────────────────────────────────────────────────

function renderLearnThePart(item) {
  const validIndexes = getLearnPartIndexes(item);
  const idx          = validIndexes[Math.floor(Math.random() * validIndexes.length)];
  const part         = item.parts[idx];
  const correct      = item.part_meanings[idx];

  setWordDisplay(item.word);
  $('wordHint').textContent  = shouldShowHint() ? item.definition : '';
  $('instruction').innerHTML = `In <strong>${item.word}</strong>, what does <strong>"${part}"</strong> mean?`;
  showArea(0);

  const choices = shuffle([correct, ...getDistractors(correct)]);
  const grid    = $('choices0');
  grid.innerHTML = '';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const ok = choice === correct;
      grid.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) markCorrect(grid, correct);
      recordAnswer(ok);
      setFeedback(
        ok ? 'good' : 'bad',
        ok ? 'Correct.' : 'Not quite.',
        `${item.word} = ${item.definition}<br>"${part}" = ${correct}`
      );
    };
    grid.appendChild(btn);
  });
}

// ── MODE 1 — Build the Word ───────────────────────────────────────────────────
function renderBuildTheWord(item) {
  setWordDisplay(item.word);
  $('wordHint').textContent    = '';
  $('instruction').textContent = 'Use the parts to work out the whole-word meaning.';
  showArea(1);

  const pcWrap = $('partCards1');
  pcWrap.innerHTML = '';
  item.parts.forEach((part, i) => {
    const div = document.createElement('div');
    div.className = 'part-card';
    div.innerHTML = shouldShowBuildMeanings()
      ? `<div class="pc-part">${part}</div><div class="pc-meaning">${item.part_meanings[i]}</div>`
      : `<div class="pc-part">${part}</div>`;
    pcWrap.appendChild(div);
  });

  const choices = shuffle([item.definition, ...item.definition_distractors].slice(0, 4));
  const grid    = $('choices1');
  grid.innerHTML = '';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const ok = choice === item.definition;
      grid.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) markCorrect(grid, item.definition);
      recordAnswer(ok);
      setFeedback(
        ok ? 'good' : 'bad',
        ok ? 'Correct.' : 'Not quite.',
        buildFeedbackDetail(item)
      );
    };
    grid.appendChild(btn);
  });
}

// ── MODE 2 — Slow It Down ─────────────────────────────────────────────────────
// Step 1 (part selection) is NOT graded. No score changes until step 2.
function renderSlowItDown(item) {
  sid2Done = false;
  setWordDisplay(item.word);
  $('wordHint').textContent    = '';
  $('instruction').textContent = 'Identify the parts first — then choose the meaning.';
  showArea(2);
  $('partBreakdown2').classList.add('hidden');
  $('meaningReveal2').classList.add('hidden');
  clearFeedback();

  const correctPair = item.parts.join(' + ');
  const options = shuffle([
    correctPair,
    ...item.part_pair_distractors.map(p => p.join(' + '))
  ]).slice(0, 4);

  const tileGrid = $('tileGrid2');
  tileGrid.innerHTML = '';

  options.forEach(pair => {
    const btn = document.createElement('button');
    btn.className   = 'tile-btn';
    btn.textContent = pair;
    btn.onclick = () => {
      if (sid2Done) return;
      if (pair === correctPair) {
        // ✓ Correct parts — ungraded, just advance
        sid2Done = true;
        btn.classList.add('selected');
        tileGrid.querySelectorAll('.tile-btn').forEach(b => b.disabled = true);
        $('instruction').textContent = 'Good. Now choose the meaning.';
        // Tier 1: show part = meaning breakdown. Tier 2/3: highlighted tile is enough.
        const bd = $('partBreakdown2');
        if (shouldShowSlowBreakdown()) {
          bd.innerHTML = item.parts.map((p, i) => `${p} = ${item.part_meanings[i]}`).join('<br>');
          bd.classList.remove('hidden');
        } else {
          bd.classList.add('hidden');
        }
        revealMeaningStep(item);
      } else {
        // ✗ Wrong parts — ungraded nudge, no score change
        btn.classList.add('nudge');
        setTimeout(() => btn.classList.remove('nudge'), 500);
        $('instruction').textContent = "That's not the right parts. Try again.";
      }
    };
    tileGrid.appendChild(btn);
  });
}

function revealMeaningStep(item) {
  const reveal = $('meaningReveal2');
  reveal.classList.remove('hidden');

  const choices = shuffle([item.definition, ...item.definition_distractors].slice(0, 4));
  const grid    = $('choices2');
  grid.innerHTML = '';

  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => {
      if (answered) return;
      answered = true;
      const ok = choice === item.definition;
      grid.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
      btn.classList.add(ok ? 'correct' : 'wrong');
      if (!ok) markCorrect(grid, item.definition);
      recordAnswer(ok); // only graded answer in this mode
      setFeedback(
        ok ? 'good' : 'bad',
        ok ? 'Correct.' : 'Not quite.',
        buildFeedbackDetail(item)
      );
    };
    grid.appendChild(btn);
  });
}

// Highlight the correct answer in a choice grid
function markCorrect(grid, correctText) {
  grid.querySelectorAll('.choice-btn').forEach(b => {
    if (b.textContent === correctText) b.classList.add('correct');
  });
}

// ── Navigation ─────────────────────────────────────────────────────────────────
function nextQuestion() {
  answered = false;
  sid2Done = false;
  clearFeedback();
  current = randomItem();
  if (mode === 0) renderLearnThePart(current);
  if (mode === 1) renderBuildTheWord(current);
  if (mode === 2) renderSlowItDown(current);
  updateStats();
}

function resetMode() {
  const s = modeStats[mode];
  s.correct = 0; s.tried = 0; s.streak = 0; s.best = 0; s.best60 = 0;
  if (challengeActive) endChallenge(false);
  nextQuestion();
}

// ── 60-Second Challenge ────────────────────────────────────────────────────────
function toggleChallenge() {
  challengeActive ? endChallenge(true) : startChallenge();
}

function startChallenge() {
  challengeActive  = true;
  timerSec         = 60;
  challengeStart   = modeStats[mode].correct;

  $('challengeBtn').textContent = 'End Challenge';
  $('challengeBtn').className   = 'ctrl-btn challenge-end';
  $('timerBox').classList.add('visible');
  tickTimer();

  challengeInterval = setInterval(() => {
    timerSec--;
    tickTimer();
    if (timerSec <= 0) endChallenge(true);
  }, 1000);

  nextQuestion();
}

function endChallenge(saveBest) {
  challengeActive = false;
  clearInterval(challengeInterval);
  challengeInterval = null;

  let scored = 0;
  if (saveBest) {
    scored = modeStats[mode].correct - challengeStart;
    if (scored > modeStats[mode].best60) modeStats[mode].best60 = scored;
    setFeedback('good', "Time's up!", `You got ${scored} correct.<br>Best: ${modeStats[mode].best60}`);
  }

  $('challengeBtn').textContent = '60-Second Challenge';
  $('challengeBtn').className   = 'ctrl-btn challenge-start';
  $('timerBox').classList.remove('visible');
  updateStats();
}

function tickTimer() {
  const m = Math.floor(timerSec / 60);
  const s = timerSec % 60;
  $('timerVal').textContent = `${m}:${String(s).padStart(2, '0')}`;
}

// ── Init ───────────────────────────────────────────────────────────────────────
updateStats();
nextQuestion();
</script>
</body>
</html>
